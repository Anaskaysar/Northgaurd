  <text x="184" y="403" text-anchor="middle" fill="#6b7280" font-size="8">OpenAI API</text>

  <rect x="286" y="322" width="148" height="88" rx="8" fill="#1f1f1f" stroke="#f97316" stroke-width="1.5"/>
  <text x="360" y="345" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Zone Compliance</text>
  <text x="360" y="359" text-anchor="middle" fill="#f97316" font-size="10" font-weight="bold">Engine</text>
  <text x="360" y="374" text-anchor="middle" fill="#9ca3af" font-size="9">Detected PPE vs</text>
  <text x="360" y="388" text-anchor="middle" fill="#9ca3af" font-size="9">zone requirements</text>
  <text x="360" y="402" text-anchor="middle" fill="#6b7280" font-size="8">Ontario Reg 854</text>

  <rect x="462" y="322" width="148" height="88" rx="8" fill="#1f1f1f" stroke="#f59e0b" stroke-width="1.5"/>
