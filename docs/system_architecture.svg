  <circle cx="470" cy="531" r="3" fill="#ef4444"/>
  <text x="478" y="535" fill="#6b7280" font-size="8">Audit write</text>
  <line x1="540" y1="531" x2="558" y2="531" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="563" y="535" fill="#6b7280" font-size="8">Context / read</text>
</svg>
