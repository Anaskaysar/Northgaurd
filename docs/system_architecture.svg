  <text x="703" y="377" text-anchor="middle" fill="#6b7280" font-size="9">Ontario Reg 854</text>
  <text x="703" y="391" text-anchor="middle" fill="#6b7280" font-size="9">Northern ON context</text>
  <text x="703" y="405" text-anchor="middle" fill="#6b7280" font-size="8">data/safety_refs/</text>

