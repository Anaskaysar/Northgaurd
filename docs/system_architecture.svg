  <text x="536" y="363" text-anchor="middle" fill="#9ca3af" font-size="9">Evidence + zone context</text>
  <text x="536" y="377" text-anchor="middle" fill="#9ca3af" font-size="9">Supervisor action</text>
  <text x="536" y="391" text-anchor="middle" fill="#9ca3af" font-size="9">stop_work · intervene</text>
  <text x="536" y="405" text-anchor="middle" fill="#6b7280" font-size="8">NVIDIA + GPT-4o-mini fallback</text>

  <rect x="638" y="322" width="130" height="88" rx="8" fill="#1f1f1f" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3"/>
