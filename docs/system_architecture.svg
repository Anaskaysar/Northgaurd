  <line x1="325" y1="205" x2="380" y2="240" stroke="#f97316" stroke-width="1.5"/>
  <line x1="380" y1="278" x2="220" y2="322" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="258" y1="366" x2="286" y2="366" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="434" y1="366" x2="462" y2="366" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <line x1="638" y1="366" x2="610" y2="366" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)" stroke-dasharray="4,3"/>
  <line x1="430" y1="278" x2="430" y2="442" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <line x1="520" y1="240" x2="680" y2="126" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="770" y1="442" x2="795" y2="170" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>
  <line x1="536" y1="322" x2="490" y2="278" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- Legend -->
  <circle cx="120" cy="531" r="3" fill="#10b981"/>
  <text x="128" y="535" fill="#6b7280" font-size="8">Vision detection</text>
