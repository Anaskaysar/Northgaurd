  <text x="184" y="363" text-anchor="middle" fill="#9ca3af" font-size="9">Hard hat · Hi-vis vest</text>
  <text x="184" y="377" text-anchor="middle" fill="#9ca3af" font-size="9">Fatigue indicators</text>
