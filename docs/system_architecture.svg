  <rect x="110" y="82" width="120" height="88" rx="8" fill="#1f1f1f" stroke="#f97316" stroke-width="1.5"/>
  <text x="170" y="108" text-anchor="middle" fill="#f97316" font-size="22">&#128247;</text>
  <text x="170" y="128" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Worker Photo</text>
  <text x="170" y="143" text-anchor="middle" fill="#9ca3af" font-size="9">Upload / capture</text>
  <text x="170" y="158" text-anchor="middle" fill="#9ca3af" font-size="9">JPG · PNG · WEBP</text>

  <rect x="265" y="82" width="120" height="88" rx="8" fill="#1f1f1f" stroke="#f97316" stroke-width="1.5"/>
  <text x="325" y="108" text-anchor="middle" fill="#f97316" font-size="22">&#128205;</text>
  <text x="325" y="128" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">Zone Selector</text>
  <text x="325" y="143" text-anchor="middle" fill="#9ca3af" font-size="9">Surface · Open Pit</text>
  <text x="325" y="158" text-anchor="middle" fill="#9ca3af" font-size="9">Underground · Stope</text>

  <rect x="680" y="82" width="150" height="88" rx="8" fill="#1f1f1f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="755" y="108" text-anchor="middle" fill="#3b82f6" font-size="22">&#128421;</text>
  <text x="755" y="128" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">React Dashboard</text>
  <text x="755" y="143" text-anchor="middle" fill="#9ca3af" font-size="9">Zone compliance panel</text>
  <text x="755" y="158" text-anchor="middle" fill="#9ca3af" font-size="9">Evidence · Action · Audit</text>

  <!-- BACKEND LAYER -->
