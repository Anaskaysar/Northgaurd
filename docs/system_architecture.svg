<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, sans-serif">
  <title>Northern Shift Guard — System Architecture</title>
  <desc>End-to-end pipeline from worker photo upload through GPT-4o vision, zone compliance, Nemotron reasoning, TiDB audit, and back to the UI</desc>

  <!-- Background -->
  <rect width="860" height="540" fill="#1a1a1a" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#f97316" font-size="15" font-weight="bold" letter-spacing="2">NORTHERN SHIFT GUARD — SYSTEM ARCHITECTURE</text>
  <text x="430" y="54" text-anchor="middle" fill="#6b7280" font-size="10">NorthMind · Cursor Hackathon Sudbury 2026</text>

  <!-- Layer Labels -->
  <text x="34" y="105" fill="#6b7280" font-size="9" font-weight="bold" letter-spacing="1">FRONTEND</text>
  <text x="34" y="225" fill="#6b7280" font-size="9" font-weight="bold" letter-spacing="1">BACKEND</text>
  <text x="34" y="345" fill="#6b7280" font-size="9" font-weight="bold" letter-spacing="1">AI LAYER</text>
  <text x="34" y="465" fill="#6b7280" font-size="9" font-weight="bold" letter-spacing="1">STORAGE</text>

