  <text x="220" y="486" text-anchor="middle" fill="#9ca3af" font-size="9">vision_json</text>
  <text x="330" y="486" text-anchor="middle" fill="#9ca3af" font-size="9">zone_compliance</text>
  <text x="440" y="486" text-anchor="middle" fill="#9ca3af" font-size="9">nemotron_action</text>
  <text x="560" y="486" text-anchor="middle" fill="#9ca3af" font-size="9">provider_info</text>
  <text x="660" y="486" text-anchor="middle" fill="#9ca3af" font-size="9">timestamp</text>
  <text x="440" y="504" text-anchor="middle" fill="#6b7280" font-size="8">SQLite fallback for local dev · MySQL/TiDB in production · northernguard cluster</text>

  <!-- ARROWS -->
  <defs>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
