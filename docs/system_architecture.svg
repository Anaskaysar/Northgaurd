  <text x="430" y="228" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">FastAPI Backend</text>
  <text x="430" y="244" text-anchor="middle" fill="#9ca3af" font-size="9">POST /api/analyze</text>
  <text x="430" y="259" text-anchor="middle" fill="#9ca3af" font-size="9">GET /api/scans · GET /api/zones</text>
  <text x="430" y="272" text-anchor="middle" fill="#6b7280" font-size="8">Uvicorn · Pydantic schemas</text>

